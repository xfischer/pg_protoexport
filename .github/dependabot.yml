version: 2
updates:
  # .NET dependencies (centrally managed in Directory.Packages.props)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dotnet-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by the CI and publish workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
