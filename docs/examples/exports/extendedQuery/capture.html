:{}}},{"idx":19,"packetIndex":1,"direction":"S-\u003EC","code":"Z","name":"ReadyForQuery","lengthBytes":6,"headline":"Server ready (Idle)","fields":[{"id":"f19-code","name":"code","display":"Z","offset":0,"length":1},{"id":"f19-length","name":"length","display":"5","offset":1,"length":4},{"id":"f19-statusCode","name":"statusCode","display":"I","offset":5,"length":1}],"rationale":"Server is idle and ready for the next command. The status code (I/T/E) tells the client whether a transaction is open.","stateAfter":{"connState":"Ready","txStatus":"Idle","prepared":{"":"select oid, typname, typtype from pg_type where typtype \u003C\u003E $1 limit 10;"},"portals":{},"serverParams":{}}},{"idx":20,"packetIndex":2,"direction":"C-\u003ES","code":"X","name":"Terminate","lengthBytes":5,"headline":"Client terminates the connection","fields":[{"id":"f20-code","name":"code","display":"X","offset":0,"length":1},{"id":"f20-length","name":"length","display":"4","offset":1,"length":4}],"rationale":"Client gracefully closes the connection. No reply expected.","stateAfter":{"connState":"Terminated","txStatus":"Idle","prepared":{"":"select oid, typname, typtype from pg_type where typtype \u003C\u003E $1 limit 10;"},"portals":{},"serverParams":{}}}],"interludes":[{"patternId":"extended_query_batch","insertBeforeCardIdx":0,"title":"Pipelining the extended-query protocol","body":"Notice that the client just sent Parse, Bind, Describe, Execute, and Sync back-to-back without waiting for a single reply. This is the whole point of the extended-query protocol: the client fires the entire batch and then reads the five responses in order (ParseComplete, BindComplete, RowDescription/NoData, then DataRows \u002B CommandComplete, then ReadyForQuery). Compare this with a simple Query message, which is one round trip with a streaming reply \u2014 the extended protocol trades simplicity for the ability to send parameters out-of-band, reuse prepared statements, and request binary result formats. Sync at the end is what tells the server \u0022that\u0027s the batch; reply with ReadyForQuery and resync error state.\u0022"}],"glossary":{"Parse":{"definition":"Frontend message that asks the server to prepare a (possibly named) SQL statement. Establishes the named prepared statement on the server.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-PARSE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"ParseComplete":{"definition":"Backend message acknowledging that a Parse succeeded. The named prepared statement is now available.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-PARSECOMPLETE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"Bind":{"definition":"Frontend message that binds a prepared statement to a portal with concrete parameter values and result format codes.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-BIND","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"BindComplete":{"definition":"Backend message acknowledging that a Bind succeeded. The portal is created and ready to be executed.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-BINDCOMPLETE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"Execute":{"definition":"Frontend message that runs the SQL behind a portal and streams back rows. Distinct from Sync.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-EXECUTE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"Describe":{"definition":"Frontend message asking the server to describe a statement (parameter types) or a portal (column types).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-DESCRIBE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"Sync":{"definition":"Frontend message that closes a batch of extended-query commands. The server responds with ReadyForQuery and resyncs error state.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-SYNC","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"Query":{"definition":"Frontend simple-query message: a single SQL string. Server runs it and streams back row descriptions, data, and CommandComplete.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-QUERY","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"Terminate":{"definition":"Frontend message that gracefully closes the connection. No reply expected.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-TERMINATE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"StartupMessage":{"definition":"First message a frontend sends after connecting. Carries protocol version and the parameter list (user, database, application_name, ...).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-STARTUPMESSAGE"},"SSLRequest":{"definition":"Frontend pseudo-message sent before StartupMessage to ask whether the server accepts TLS. Server replies with a single byte (S = yes, N = no).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-SSLREQUEST"},"SSLResponse":{"definition":"Backend single-byte reply to SSLRequest: \u0027S\u0027 = TLS accepted (client should now begin TLS handshake), \u0027N\u0027 = TLS not supported (client should either give up or continue in cleartext).","docLink":"https://www.postgresql.org/docs/current/protocol-flow.html#PROTOCOL-FLOW-SSL"},"GSSENCRequest":{"definition":"Frontend pseudo-message asking whether the server accepts GSSAPI encryption. Same 8-byte shape as SSLRequest, request code 80877104. Server replies with a single byte (G = yes, N = no).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-GSSENCREQUEST"},"GSSENCResponse":{"definition":"Backend single-byte reply to GSSENCRequest: \u0027G\u0027 = GSSAPI accepted, \u0027N\u0027 = GSSAPI not supported (client continues without GSS encryption).","docLink":"https://www.postgresql.org/docs/current/protocol-flow.html#PROTOCOL-FLOW-SSL"},"CancelRequest":{"definition":"Frontend message sent on a fresh TCP connection to cancel an in-flight query on another connection. Carries the (pid, secret) pair the server sent earlier in BackendKeyData.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-CANCELREQUEST"},"ReadyForQuery":{"definition":"Backend message indicating the server is idle and the transaction status: I (idle), T (in a transaction), E (in a failed transaction).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-READYFORQUERY","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"RowDescription":{"definition":"Backend message that announces the schema of upcoming DataRow messages: column names, table OID, type OID, format code (0 = text, 1 = binary).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-ROWDESCRIPTION","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/access/common/printtup.c"},"DataRow":{"definition":"Backend message carrying one row of values, one entry per column described by the preceding RowDescription.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-DATAROW","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/access/common/printtup.c"},"CommandComplete":{"definition":"Backend message marking the end of a successful statement, with a command tag like \u0027SELECT 3\u0027 or \u0027INSERT 0 1\u0027.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-COMMANDCOMPLETE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"ErrorResponse":{"definition":"Backend message reporting an error. Carries fields keyed by single-letter codes (S=severity, C=SQLSTATE, M=message, D=detail, ...).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-ERRORRESPONSE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/utils/error/elog.c"},"NoticeResponse":{"definition":"Backend message reporting a non-fatal notice (warning, info, ...). Same field layout as ErrorResponse.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-NOTICERESPONSE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/utils/error/elog.c"},"ParameterStatus":{"definition":"Backend broadcast of a server-side setting (e.g. server_version, client_encoding). Sent unprompted on startup and on change.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-PARAMETERSTATUS"},"ParameterDescription":{"definition":"Backend response to a Describe-statement request, listing the OID of each parameter the prepared statement expects.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-PARAMETERDESCRIPTION","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"NoData":{"definition":"Backend reply to a Describe when the statement or portal will not produce any rows (e.g. DML without RETURNING).","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-NODATA","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/tcop/postgres.c"},"BackendKeyData":{"definition":"Backend message sent at startup carrying the server\u0027s process ID and a secret cancellation key. Needed to send a CancelRequest later.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-BACKENDKEYDATA"},"AuthenticationOK":{"definition":"Backend message confirming authentication succeeded. The server then sends ParameterStatus, BackendKeyData, and ReadyForQuery.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-AUTHENTICATIONOK","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth.c"},"AuthenticationMD5Password":{"definition":"Backend challenge asking the client to send a hashed (MD5 \u002B salt) password. Legacy mechanism, superseded by SCRAM in modern Postgres.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-AUTHENTICATIONMD5PASSWORD","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth.c"},"AuthenticationSASL":{"definition":"Backend message initiating SASL authentication, listing the SASL mechanisms (e.g. SCRAM-SHA-256) the server supports.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-AUTHENTICATIONSASL","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth-scram.c"},"AuthenticationSASLContinue":{"definition":"Backend mid-handshake message carrying the SASL server-challenge for the next client step.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-AUTHENTICATIONSASLCONTINUE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth-scram.c"},"AuthenticationSASLFinal":{"definition":"Backend final SASL message carrying the server\u0027s proof. After this, AuthenticationOK follows.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-AUTHENTICATIONSASLFINAL","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth-scram.c"},"SASLInitialResponse":{"definition":"Frontend response to AuthenticationSASL, carrying the chosen mechanism name and the initial SASL client-first message.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-SASLINITIALRESPONSE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth-scram.c"},"SASLResponse":{"definition":"Frontend follow-up SASL message answering AuthenticationSASLContinue.","docLink":"https://www.postgresql.org/docs/current/protocol-message-formats.html#PROTOCOL-MESSAGE-FORMATS-SASLRESPONSE","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth-scram.c"},"SCRAM":{"definition":"Salted Challenge Response Authentication Mechanism. The default password authentication in modern Postgres (RFC 5802).","docLink":"https://www.postgresql.org/docs/current/sasl-authentication.html","srcLink":"https://github.com/postgres/postgres/blob/REL_17_STABLE/src/backend/libpq/auth-scram.c"},"OID":{"definition":"Object identifier: a 4-byte integer Postgres uses internally to identify a type, table, function, etc. Common type OIDs: 23 = int4, 25 = text, 1043 = varchar.","docLink":"https://www.postgresql.org/docs/current/datatype-oid.html"},"Portal":{"definition":"A server-side cursor created by Bind, holding a prepared statement together with concrete parameter values. Read with Execute.","docLink":"https://www.postgresql.org/docs/current/protocol-flow.html#PROTOCOL-FLOW-EXT-QUERY"},"extended query":{"definition":"Multi-step query protocol (Parse -\u003E Bind -\u003E Describe -\u003E Execute -\u003E Sync) that allows prepared statements, parameter binding, and pipelining.","docLink":"https://www.postgresql.org/docs/current/protocol-flow.html#PROTOCOL-FLOW-EXT-QUERY"},"simple query":{"definition":"Single-message Query protocol: one SQL string in, one full result stream out, no parameters, no preparation.","docLink":"https://www.postgresql.org/docs/current/protocol-flow.html#PROTOCOL-FLOW-SIMPLE-QUERY"}},"rationales":{"StartupMessage":"First message on the wire. Tells the server which database, user, and options the client wants \u2014 and implicitly, which protocol version.","AuthenticationRequest":"Server\u0027s challenge before any data flows. Tells the client whether (and how) to prove identity.","AuthenticationOK":"Server has accepted the credentials. ParameterStatus and BackendKeyData follow, then ReadyForQuery.","ParameterStatus":"Server proactively shares a setting the client may care about (server_version, application_name, client_encoding, ...). Sent unsolicited at startup, and again whenever any of these change.","BackendKeyData":"Server identifies its backend process and shares the secret needed to cancel a long-running query later. Sent once, at startup.","ReadyForQuery":"Server is idle and ready for the next command. The status code (I/T/E) tells the client whether a transaction is open.","Query":"Simple-query protocol: one SQL string, one result stream. No parameters, no preparation, no cursor.","Parse":"Step 1 of the extended-query flow. Asks the server to validate and prepare a SQL statement, optionally naming it for reuse.","Bind":"Step 2 of the extended-query flow. Pairs a prepared statement with concrete parameter values and result format codes, creating a portal.","Describe":"Step 3 of the extended-query flow (optional). Asks the server to describe a prepared statement\u0027s parameter types, or a portal\u0027s result columns.","Execute":"Step 4 of the extended-query flow. Runs the portal and streams back rows.","Sync":"Step 5 of the extended-query flow. Tells the server \u0027I\u0027m done with this batch\u0027 \u2014 server responds with ReadyForQuery and resyncs error state.","RowDescription":"Server announces the schema of the result rows that are about to follow. Sent before the first DataRow of a result set.","DataRow":"One row of result values. Comes after RowDescription, before CommandComplete.","CommandComplete":"Marks the end of a successful statement. The tag tells the client what kind of operation finished (SELECT N, INSERT 0 N, UPDATE N, ...).","ErrorResponse":"Server reports a failure. After ErrorResponse, the server will send ReadyForQuery and discard the rest of any extended-query batch.","Terminate":"Client gracefully closes the connection. No reply expected.","ParseComplete":"Backend confirmation that the prior Parse succeeded. The named prepared statement (or the unnamed one) is now known to the server.","BindComplete":"Backend confirmation that the prior Bind succeeded. The portal now exists with concrete parameter values and is ready for Execute.","CloseComplete":"Backend confirmation that a Close request (against a portal or prepared statement) succeeded. The server has dropped the named object.","Close":"Frontend request to drop a portal or a prepared statement by name. Frees server-side resources without closing the connection.","Flush":"Frontend hint: \u0027flush any pending output now.\u0027 Lets the client read partial results during a long pipelined batch, without ending the batch the way Sync would.","NoData":"Backend reply to Describe when the target will produce no result rows (DML without RETURNING, DDL, ...). Replaces RowDescription in that case.","EmptyQueryResponse":"Backend response to a Query whose SQL string was empty (or whitespace/comments only). Substitutes for RowDescription/CommandComplete.","ParameterDescription":"Backend response to a Describe-statement request, listing the OIDs of the parameters the prepared statement expects. Sent before any RowDescription/NoData.","PortalSuspended":"Backend indication that an Execute hit its row limit before the result set was exhausted. The portal is still open; the client can Execute again to keep reading.","NoticeResponse":"Server reports a non-fatal notice (warning, info, debug). Can arrive unsolicited at almost any time \u2014 the client must be ready to receive it between any two normal messages.","NotificationResponse":"Server delivers a LISTEN/NOTIFY event from another backend. Arrives asynchronously; only emitted after the client has issued LISTEN for the channel.","NegotiateProtocolVersion":"Server tells the client it speaks an older protocol minor version (or doesn\u0027t recognize some startup options). Sent in response to StartupMessage when not all options were honoured.","CopyInResponse":"Backend signals \u0027I\u0027m ready to receive bulk-load data.\u0027 Sent in response to COPY ... FROM STDIN. Triggers the CopyData/CopyDone exchange in the frontend direction.","CopyOutResponse":"Backend signals \u0027I\u0027m about to stream bulk-export data.\u0027 Sent in response to COPY ... TO STDOUT. CopyData rows follow until CopyDone.","CopyBothResponse":"Backend signals a bidirectional COPY (replication only). Both sides may send CopyData until either ends with CopyDone.","CopyData":"One chunk of COPY payload (load or export). Frame size is up to the sender; receivers must concatenate to reconstruct the data stream.","CopyDataBinaryHeader":"First chunk of a binary-format COPY stream. Carries the PostgreSQL binary-file header: an 11-byte magic signature (PGCOPY\\n\\377\\r\\n\\0), a 32-bit critical-flags field (reserved, must be 0 in PG 12\u002B), a 32-bit header-extension length, and any extension bytes. See https://www.postgresql.org/docs/18/sql-copy.html.","CopyDataBinaryTrailer":"Two-byte end-of-stream marker (FF FF) that closes a binary-format COPY stream. The next message on the wire is the matching CopyDone from the sender.","CopyDataBinary":"One chunk of binary-format COPY payload. Inside the stream, the wire layout is per-tuple: int16 field count, then per-field int32 length (-1 = NULL) \u002B raw bytes. Tuples may span chunks.","CopyDone":"Sender signals end-of-stream for a COPY exchange. Server then sends CommandComplete and ReadyForQuery.","CopyFail":"Frontend aborts an in-progress COPY ... FROM with an error message. Server sends ErrorResponse and ReadyForQuery in reply.","FunctionCall":"Frontend fast-path call to a built-in function by OID. Legacy mechanism, deprecated; modern code uses SELECT or extended-query instead.","FunctionCallResponse":"Backend reply to a FunctionCall, carrying the single return value.","Password":"Frontend reply carrying credentials in response to AuthenticationMD5Password or AuthenticationCleartextPassword. (For SCRAM, SASLInitialResponse/SASLResponse are used instead.)","SSLRequest":"Frontend pseudo-message asking \u0027does this server accept TLS?\u0027 before sending StartupMessage. The server replies with a single byte: \u0027S\u0027 (yes) or \u0027N\u0027 (no).","SSLResponse":"Server\u0027s single-byte verdict on the prior SSLRequest. \u0027S\u0027 = accept (client should immediately begin TLS handshake), \u0027N\u0027 = reject (client decides whether to fall back to cleartext or give up).","GSSENCRequest":"Frontend pseudo-message asking \u0027does this server accept GSSAPI encryption?\u0027. Same 8-byte shape as SSLRequest but with request code 80877104. Npgsql 10 sends this even when SslMode=Disable.","GSSENCResponse":"Server\u0027s single-byte verdict on the prior GSSENCRequest. \u0027G\u0027 = accept, \u0027N\u0027 = reject. After a reject, the client typically falls back to a normal StartupMessage on the same connection.","CancelRequest":"Frontend message sent on a fresh TCP connection (not the in-flight one) to ask the server to cancel a running query. Carries the (pid, secret) pair the server published earlier in BackendKeyData. The server has no obligation to acknowledge; the cancel is best-effort."}}</script>
